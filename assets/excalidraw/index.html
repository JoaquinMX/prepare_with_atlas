<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excalidraw</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #1e1e2e; }
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      color: #cdd6f4;
      font-family: sans-serif;
      font-size: 16px;
    }
    #error {
      display: none;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      color: #f38ba8;
      font-family: sans-serif;
      font-size: 14px;
      text-align: center;
      padding: 24px;
    }
  </style>
</head>
<body>
  <div id="loading">Loading Excalidraw…</div>
  <div id="error"></div>
  <div id="root" style="display:none;"></div>

  <!-- Problem statement overlay — shown at session start, dismissible -->
  <div id="problem-banner" style="
    display: none;
    position: absolute;
    top: 12px;
    left: 12px;
    max-width: 560px;
    max-height: 260px;
    overflow-y: auto;
    background: rgba(30, 30, 46, 0.94);
    border: 1px solid #585b70;
    border-radius: 8px;
    padding: 14px 16px;
    z-index: 1000;
    font-family: sans-serif;
    font-size: 13px;
    color: #cdd6f4;
    line-height: 1.55;
    box-shadow: 0 4px 24px rgba(0,0,0,0.45);
  ">
    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px;">
      <span id="problem-title" style="font-size:14px; font-weight:600; color:#cdd6f4;"></span>
      <button
        onclick="document.getElementById('problem-banner').style.display='none'"
        style="background:none; border:none; color:#6c7086; cursor:pointer; font-size:20px; line-height:1; padding:0 0 0 14px; flex-shrink:0;"
      >×</button>
    </div>
    <div id="problem-description" style="color:#a6adc8; white-space:pre-wrap;"></div>
  </div>

  <!-- React + ReactDOM -->
  <script src="react.production.min.js"></script>
  <script src="react-dom.production.min.js"></script>
  <!-- Excalidraw -->
  <script src="excalidraw.production.min.js"></script>

  <script>
    // ── Bridge helpers ───────────────────────────────────────────────────────

    function postToFlutter(msg) {
      if (window.FlutterBridge && window.FlutterBridge.postMessage) {
        window.FlutterBridge.postMessage(msg);
      }
    }

    // ── Global state ─────────────────────────────────────────────────────────

    var excalidrawAPI = null;

    // ── JS Bridge API ────────────────────────────────────────────────────────

    /** Returns a JSON string of the current Excalidraw scene. */
    window.getSceneData = function () {
      if (!excalidrawAPI) return null;
      try {
        var elements = excalidrawAPI.getSceneElements();
        var appState = excalidrawAPI.getAppState();
        return JSON.stringify({ elements: elements, appState: appState });
      } catch (e) {
        return null;
      }
    };

    /** Loads a scene from a JSON string produced by getSceneData(). */
    window.loadSceneData = function (json) {
      if (!excalidrawAPI) return;
      try {
        var data = JSON.parse(json);
        var count = (data.elements || []).length;
        console.log('[Atlas] loadSceneData: elements=' + count);
        excalidrawAPI.updateScene({
          elements: data.elements || [],
          appState: data.appState || {},
        });
        postToFlutter('scene-updated:' + count);
      } catch (e) {
        console.error('[Atlas] loadSceneData error:', e);
        postToFlutter('error:loadSceneData failed – ' + e.message);
      }
    };

    /** Exports the current canvas as a base64 PNG string (no data-URL prefix). */
    window.exportToPng = function (maxWidth) {
      if (!excalidrawAPI) return null;
      try {
        var elements = excalidrawAPI.getSceneElements();
        if (!elements || elements.length === 0) return null;
        var opts = { elements: elements, mimeType: 'image/png', quality: 1 };
        if (maxWidth && maxWidth > 0) opts.maxWidthOrHeight = maxWidth;
        ExcalidrawLib.exportToBlob(opts).then(function (blob) {
          var reader = new FileReader();
          reader.onloadend = function () {
            var dataUrl = reader.result;
            var base64 = dataUrl.split(',')[1];
            if (window.FlutterBridge) {
              window.FlutterBridge.postMessage('png:' + base64);
            }
          };
          reader.readAsDataURL(blob);
        }).catch(function (err) {
          postToFlutter('error:exportToPng failed – ' + err.message);
        });
        return 'pending';
      } catch (e) {
        postToFlutter('error:exportToPng – ' + e.message);
        return null;
      }
    };

    /** Clears all elements from the canvas. */
    window.clearCanvas = function () {
      if (!excalidrawAPI) return;
      excalidrawAPI.resetScene();
    };

    /** Shows the problem statement banner with the given title and description. */
    window.setProblemStatement = function (title, description) {
      var banner = document.getElementById('problem-banner');
      var titleEl = document.getElementById('problem-title');
      var descEl = document.getElementById('problem-description');
      if (!banner || !titleEl || !descEl) return;
      titleEl.textContent = title;
      descEl.textContent = description;
      banner.style.display = 'block';
    };

    /** Enables (true) or disables (false) view-only mode. */
    window.setViewMode = function (viewOnly) {
      if (!excalidrawAPI) return;
      excalidrawAPI.updateScene({
        appState: { viewModeEnabled: viewOnly },
      });
    };

    // ── Mount Excalidraw ─────────────────────────────────────────────────────

    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      var el = document.getElementById('error');
      el.style.display = 'flex';
      el.textContent = msg;
      postToFlutter('error:' + msg);
    }

    function mountExcalidraw() {
      try {
        if (typeof ExcalidrawLib === 'undefined' || !ExcalidrawLib.Excalidraw) {
          showError('Excalidraw library failed to load.');
          return;
        }

        var rootEl = document.getElementById('root');
        document.getElementById('loading').style.display = 'none';
        rootEl.style.display = 'block';

        var excalidrawElement = React.createElement(ExcalidrawLib.Excalidraw, {
          theme: 'dark',
          UIOptions: {
            canvasActions: {
              saveToActiveFile: false,
              loadScene: false,
              export: false,
              saveAsImage: false,
            },
          },
          excalidrawAPI: function (api) {
            excalidrawAPI = api;
            postToFlutter('ready');
          },
        });

        var root = ReactDOM.createRoot(rootEl);
        root.render(excalidrawElement);
      } catch (e) {
        showError('Mount error: ' + e.message);
      }
    }

    // Wait until all scripts are loaded
    window.addEventListener('load', function () {
      try {
        mountExcalidraw();
      } catch (e) {
        showError('Startup error: ' + e.message);
      }
    });
  </script>
</body>
</html>
